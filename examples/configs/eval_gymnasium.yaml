defaults:
  - algorithm: ppo
  - _self_

seed: 42
device: cpu

env:
  id: Pendulum-v1
  num_envs: 16

train:
  # Used for checkpoint auto-discovery: <log_dir>/<algorithm.run_name>/model_*.pt
  log_dir: ./logs
  logger: tensorboard

eval:
  checkpoint: null
  num_episodes: 20
  max_steps_per_episode: 1000
  stochastic_actions: false
  print_episode_details: true
  render: false
  render_mode: human
  save_video: false
  rendering_subdir: rendering
  exported_subdir: exported
  video_path: null
  video_fps: 30
  export_onnx: true
  onnx_path: null

hydra:
  job:
    chdir: false
  run:
    dir: ${train.log_dir}/${algorithm.run_name}_eval_${now:%Y%m%d_%H%M%S}/hydra
  sweep:
    dir: ${train.log_dir}/${algorithm.run_name}_eval_multirun_${now:%Y%m%d_%H%M%S}/hydra_multirun
    subdir: ${hydra.job.num}
