name: sac
run_name: sac

train_cfg:
  num_steps_per_env: 64
  save_interval: 1000
  obs_groups:
    actor: [policy]
    critic: [policy]
  algorithm:
    class_name: SAC
    gamma: 0.99
    tau: 0.005
    learning_rate: 3.0e-4
    auto_entropy_tuning: true
    replay_buffer_size: 100000
    batch_size: 256
    gradient_steps: 1
    learning_starts: 1000
    optimizer: adam
  actor:
    class_name: MLPModel
    hidden_dims: [256, 256]
    activation: elu
  critic:
    class_name: MLPModel
    hidden_dims: [256, 256]
    activation: elu
