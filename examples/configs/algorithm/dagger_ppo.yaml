name: dagger_ppo
run_name: dagger_ppo
seed_offset: 1000

train_cfg:
  num_steps_per_env: 64
  save_interval: 1000
  obs_groups:
    actor: [policy]
    critic: [policy]
    teacher: [policy]
  algorithm:
    class_name: DaggerPPO
    num_learning_epochs: 4
    num_mini_batches: 4
    clip_param: 0.2
    gamma: 0.99
    lam: 0.95
    value_loss_coef: 1.0
    entropy_coef: 0.0
    learning_rate: 3.0e-4
    max_grad_norm: 1.0
    schedule: adaptive
    desired_kl: 0.01
    dagger_loss_coef: 1.0
    loss_type: mse
  actor:
    class_name: MLPModel
    hidden_dims: [128, 128]
    activation: elu
    distribution_cfg:
      class_name: GaussianDistribution
      init_std: 1.0
      std_type: scalar
  critic:
    class_name: MLPModel
    hidden_dims: [128, 128]
    activation: elu
  teacher:
    class_name: MLPModel
    hidden_dims: [128, 128]
    activation: elu
    distribution_cfg:
      class_name: GaussianDistribution
      init_std: 1.0
      std_type: scalar

teacher:
  run_name: teacher_ppo
  learning_iterations: 40
  checkpoint_name: teacher_ppo_checkpoint.pt
  train_cfg:
    num_steps_per_env: 64
    save_interval: 1000
    obs_groups:
      actor: [policy]
      critic: [policy]
    algorithm:
      class_name: PPO
      num_learning_epochs: 4
      num_mini_batches: 4
      clip_param: 0.2
      gamma: 0.99
      lam: 0.95
      value_loss_coef: 1.0
      entropy_coef: 0.0
      learning_rate: 3.0e-4
      max_grad_norm: 1.0
      schedule: adaptive
      desired_kl: 0.01
    actor:
      class_name: MLPModel
      hidden_dims: [128, 128]
      activation: elu
      distribution_cfg:
        class_name: GaussianDistribution
        init_std: 1.0
        std_type: scalar
    critic:
      class_name: MLPModel
      hidden_dims: [128, 128]
      activation: elu
